name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  archive:
    name: Archive + TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Marketing version: $TAG"

      # The following four steps require repository-level secrets. They are
      # not wired here because key generation + provisioning is a deployment
      # decision, not a code decision. Uncomment and populate the environment
      # variables once the secrets are configured in GitHub Actions:
      #
      #   secrets.APPLE_ID_USERNAME
      #   secrets.APPLE_APP_SPECIFIC_PASSWORD
      #   secrets.MATCH_PASSWORD
      #   secrets.APP_STORE_CONNECT_API_KEY_ID
      #   secrets.APP_STORE_CONNECT_API_ISSUER_ID
      #   secrets.APP_STORE_CONNECT_API_KEY  (base64 .p8)
      #
      # - name: Install fastlane
      #   run: gem install fastlane --no-document
      # - name: Import signing certificates
      #   run: bundle exec fastlane run match type:"appstore" readonly:true
      # - name: Archive + upload to TestFlight
      #   run: bundle exec fastlane beta version:${{ steps.version.outputs.version }}

      - name: Build archive (dry-run without signing)
        run: |
          xcodebuild \
            -scheme ZeroDark \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            archive -archivePath build/ZeroDark.xcarchive | xcbeautify || true

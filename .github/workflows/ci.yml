name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build + Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: SwiftLint (advisory)
        # NOTE: `--strict` is intentionally NOT set. The initial lint
        # config in PR-A8 surfaces several hundred pre-existing
        # violations (force unwraps, short identifiers like t/p/d,
        # trailing newlines, cyclomatic complexity, implicit optional
        # init, etc.). Treating those as CI-breakers blocks every
        # other PR until a dedicated lint-cleanup sweep lands. Run as
        # advisory here; `continue-on-error` lets the rest of the
        # pipeline continue so build + test still gate merges.
        continue-on-error: true
        run: |
          if ! command -v swiftlint >/dev/null; then
            brew install swiftlint
          fi
          swiftlint --config .swiftlint.yml || true

      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -scheme ZeroDark

      - name: Build (iOS generic)
        # SWIFT_TREAT_WARNINGS_AS_ERRORS is off for the same reason as
        # SwiftLint --strict: flipping it on surfaces a large backlog
        # of pre-existing deprecation warnings. Flip it once the
        # codebase is clean.
        run: |
          xcodebuild \
            -scheme ZeroDark \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            build | xcbeautify

      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -scheme ZeroDark \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -enableCodeCoverage YES \
            test | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test_output/
            **/*.xcresult
          if-no-files-found: ignore

name: ZeroDark
options:
  bundleIdPrefix: com.bobbyhansen
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.18.0"
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main

targets:
  ZeroDark:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - README.md
      - path: Sources/MLXEdgeLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bobbyhansen.zerodark
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXRandom
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwift
        product: MLXOptimizers
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXVLM
    entitlements:
      path: ZeroDark.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
